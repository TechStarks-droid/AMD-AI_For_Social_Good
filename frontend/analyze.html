<!DOCTYPE html>
<html>
<head>
    <title>Analyze Prescription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Prescription Analyzer</h1>
    <div class="subtitle">
        Upload a printed prescription image to evaluate medication safety.
    </div>

    <input type="file" id="imageInput">
    <br><br>
    <button onclick="analyze()">Analyze Prescription</button>

    <div id="loading"></div>
</div>

<script>
async function analyze() {

    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];
    const loading = document.getElementById("loading");

    if (!file) {
        alert("Please upload an image first.");
        return;
    }

    loading.innerText = "Analyzing prescription...";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("http://127.0.0.1:8000/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        localStorage.setItem("analysisResult", JSON.stringify(data));
        window.location.href = "result.html";

    } catch (error) {
        loading.innerText = "Error connecting to backend.";
        console.error(error);
    }
}
</script>

</body>
</html>
